services:
  database:
    env_file:
      - ./.env
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: changsure-database-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Bangkok
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_prod:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - changsure-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -p${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    env_file:
      - ./.env
    image: minio/minio:${MINIO_VERSION:-latest}
    container_name: changsure-minio-prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: Asia/Bangkok
    volumes:
      - minio_prod:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - changsure-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:9000/minio/health/live >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 20s
      retries: 5

  redis:
    env_file:
      - ./.env
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: changsure-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_prod:/data
    ports:
      - "6379:6379"
    networks:
      - changsure-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # OCR Service (prod)
  # ใช้ build จากโฟลเดอร์ใน VM เพื่อแก้ปัญหา image not found
  # ถ้าคุณ push image ขึ้น DockerHub แล้ว ให้สลับเป็น image ได้
  ocr:
    env_file:
      - ./.env
    build:
      context: ../../ocr-service
      dockerfile: Dockerfile
    # image: ${REGISTRY:-docker.io}/${DOCKERHUB_USERNAME:-arynx}/ocr-service:${IMAGE_TAG:-latest}
    container_name: changsure-ocr-prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - changsure-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8000/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  core-service:
    env_file:
      - ./.env
    image: ${REGISTRY:-docker.io}/${DOCKERHUB_USERNAME:-arynx}/changsure-core-service:${IMAGE_TAG:-latest}
    container_name: changsure-core-service-prod
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      ocr:
        condition: service_started
    networks:
      - changsure-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  client:
    env_file:
      - ./.env
    image: ${REGISTRY:-docker.io}/${DOCKERHUB_USERNAME:-arynx}/changsure-client:${IMAGE_TAG:-latest}
    container_name: changsure-client-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - core-service
    networks:
      - changsure-network
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:80 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  changsure-network:
    driver: bridge

volumes:
  mysql_prod:
  minio_prod:
  redis_prod:
