name: changsure-dev

services:
  db:
    container_name: changsure-mysql-local
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Bangkok
    ports:
      - "127.0.0.1:${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - changsure-net

  redis:
    container_name: changsure-redis-local
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - changsure-net

  minio:
    container_name: changsure-minio-local
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - changsure-net

ocr:
  container_name: changsure-ocr-local
  build:
    context: ../ocr-service
    dockerfile: Dockerfile
    target: runtime
  restart: unless-stopped

  environment:
    OCR_USE_GPU: false
    OCR_WORKERS: 1
    OCR_TIMEOUT_SECONDS: 20  
    MIN_CONFIDENCE_THRESHOLD: 0.3

  mem_limit: 2g            
  cpus: 1.0                  

  ports:
    - "127.0.0.1:8000:8000"

  networks:
    - changsure-net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  ocr_models:
    driver: local

networks:
  changsure-net:
    driver: bridge
