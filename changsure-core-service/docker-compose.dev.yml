version: "3.9"

services:
  db:
    container_name: changsure-mysql-local
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: changSure@sit.65
      MYSQL_DATABASE: changsurev1
      MYSQL_USER: changSure
      MYSQL_PASSWORD: changSure@sit.65
      TZ: Asia/Bangkok
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    container_name: changsure-redis-local
    image: redis:7
    restart: always
    ports:
      - "127.0.0.1:6379:6379"

  minio:
    container_name: changsure-minio-local
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

  ocr:
    container_name: paddle-ocr-service-local
    build:
      context: ../ocr-service
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

volumes:
  mysql_data:
  minio_data:
