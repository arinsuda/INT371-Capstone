services:
  db:
    container_name: changsure-mysql-local
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: changSure@sit.65
      MYSQL_DATABASE: changsurev1
      MYSQL_USER: changSure
      MYSQL_PASSWORD: changSure@sit.65
      TZ: Asia/Bangkok
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: changsure-redis-local
    image: redis:7
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    container_name: changsure-minio-local
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  ocr:
    container_name: changsure-ocr-local
    build:
      context: ../ocr-service
      dockerfile: Dockerfile
      target: runtime
    image: changsure-ocr:local
    restart: unless-stopped
    environment:
      APP_ENV: development
      OCR_USE_GPU: "false"
      OCR_WORKERS: "1"
      ENABLE_DOCS: "true"           
      MIN_CONFIDENCE_THRESHOLD: "0.3"
      OCR_TIMEOUT_SECONDS: "120"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ocr_models:/app/.easyocr 
    mem_limit: 4g 
    memswap_limit: 4g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 30s
      timeout: 10s
      start_period: 90s           
      retries: 3

volumes:
  mysql_data:
  minio_data:
  ocr_models:                     