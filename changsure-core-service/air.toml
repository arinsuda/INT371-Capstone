# air.toml (minimal, ชัวร์สุด)
[build]
cmd = "GOARCH=arm64 GOTOOLCHAIN=go1.25.3 go build -o ./tmp/main ./cmd/api"
bin = "./tmp/main"

# ให้ air รู้ว่าไฟล์แบบไหน/ที่ไหนต้องเฝ้าดู
include_ext = ["go", "mod", "sum", "env", "toml", "yaml", "yml"]
exclude_dir = ["tmp", "vendor", "node_modules"]

# ทำให้รีสตาร์ทเนียนขึ้น
send_interrupt = true      # ส่ง SIGINT ไปปิดโปรเซสเก่า
kill_delay = 500           # รอ 0.5s ก่อน kill ถ้ายังไม่ดับ
delay = 1000               # รอ 1s หลัง build ก่อนสตาร์ทใหม่ (กันลูป/ไฟล์ยังเขียนไม่เสร็จ)

# ถ้า build ผิด ให้หยุด binary เก่าไปเลยจะเห็นชัดว่า error
stop_on_error = true

# (ทางเลือก) เปิด log ไว้เช็ค
log = "build.log"
