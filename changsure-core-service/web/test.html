<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card ROI Calibration Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            background: #f0f1ff;
            border-color: #764ba2;
        }
        
        .upload-area.dragging {
            background: #e8e9ff;
            transform: scale(1.02);
        }
        
        input[type="file"] {
            display: none;
        }
        
        .canvas-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .canvas-wrapper {
            position: relative;
            border: 2px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            background: #f5f5f5;
        }
        
        .canvas-wrapper h3 {
            background: #667eea;
            color: white;
            padding: 15px;
            margin: 0;
            font-size: 1.2em;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .control-group {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .control-group input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
        }
        
        .control-group .value {
            text-align: center;
            font-size: 1.1em;
            color: #667eea;
            font-weight: bold;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 150px;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        button.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        button.secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        button.secondary:hover {
            background: #e0e0e0;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border: 2px solid #667eea;
        }
        
        .result h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .result pre {
            background: #fff;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .stat-card .label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .stat-card .value {
            color: #667eea;
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .roi-box {
            position: absolute;
            border: 3px solid #ff0000;
            background: rgba(255, 0, 0, 0.1);
            pointer-events: none;
        }
        
        .upload-icon {
            font-size: 4em;
            color: #667eea;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 ID Card ROI Calibration Tool</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📤</div>
            <h3>อัพโหลดภาพบัตรประชาชน</h3>
            <p>คลิกหรือลากไฟล์มาวางที่นี่</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label>X Position: <span class="value" id="xValue">30%</span></label>
                <input type="range" id="xSlider" min="0" max="100" value="30">
            </div>
            <div class="control-group">
                <label>Y Position: <span class="value" id="yValue">12%</span></label>
                <input type="range" id="ySlider" min="0" max="100" value="12">
            </div>
            <div class="control-group">
                <label>Width: <span class="value" id="wValue">55%</span></label>
                <input type="range" id="wSlider" min="10" max="100" value="55">
            </div>
            <div class="control-group">
                <label>Height: <span class="value" id="hValue">8%</span></label>
                <input type="range" id="hSlider" min="5" max="50" value="8">
            </div>
            <div class="control-group">
                <label>Contrast: <span class="value" id="contrastValue">2.5</span></label>
                <input type="range" id="contrastSlider" min="10" max="50" value="25" step="1">
            </div>
            <div class="control-group">
                <label>Threshold: <span class="value" id="thresholdValue">128</span></label>
                <input type="range" id="thresholdSlider" min="0" max="255" value="128">
            </div>
        </div>
        
        <div class="button-group">
            <button class="primary" id="processBtn" disabled>🔍 Process Image</button>
            <button class="secondary" id="autoDetectBtn" disabled>🎯 Auto Detect</button>
            <button class="secondary" id="resetBtn">🔄 Reset</button>
            <button class="secondary" id="exportBtn" disabled>💾 Export Config</button>
        </div>
        
        <div class="stats" id="stats" style="display:none;">
            <div class="stat-card">
                <div class="label">Image Size</div>
                <div class="value" id="imageSize">-</div>
            </div>
            <div class="stat-card">
                <div class="label">ROI Size</div>
                <div class="value" id="roiSize">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Detected Text</div>
                <div class="value" id="detectedChars">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Confidence</div>
                <div class="value" id="confidence">-</div>
            </div>
        </div>
        
        <div class="canvas-container" id="canvasContainer" style="display:none;">
            <div class="canvas-wrapper">
                <h3>📷 Original Image</h3>
                <canvas id="originalCanvas"></canvas>
            </div>
            <div class="canvas-wrapper">
                <h3>✂️ Extracted ROI</h3>
                <canvas id="roiCanvas"></canvas>
            </div>
            <div class="canvas-wrapper">
                <h3>🎨 Preprocessed</h3>
                <canvas id="processedCanvas"></canvas>
            </div>
            <div class="canvas-wrapper">
                <h3>🔤 OCR Ready</h3>
                <canvas id="finalCanvas"></canvas>
            </div>
        </div>
        
        <div class="result" id="result" style="display:none;">
            <h3>📊 OCR Result</h3>
            <pre id="ocrResult"></pre>
        </div>
    </div>

    <script>
        let originalImage = null;
        let currentROI = { x: 0.30, y: 0.12, w: 0.55, h: 0.08 };
        
        // Upload handling
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragging');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragging');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragging');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadImage(file);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadImage(file);
            }
        });
        
        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    displayImage();
                    document.getElementById('processBtn').disabled = false;
                    document.getElementById('autoDetectBtn').disabled = false;
                    document.getElementById('exportBtn').disabled = false;
                    document.getElementById('canvasContainer').style.display = 'grid';
                    document.getElementById('stats').style.display = 'grid';
                    document.getElementById('imageSize').textContent = 
                        `${img.width}×${img.height}`;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function displayImage() {
            if (!originalImage) return;
            
            const canvas = document.getElementById('originalCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            ctx.drawImage(originalImage, 0, 0);
            
            // Draw ROI box
            drawROIBox(ctx, canvas.width, canvas.height);
        }
        
        function drawROIBox(ctx, width, height) {
            const x = currentROI.x * width;
            const y = currentROI.y * height;
            const w = currentROI.w * width;
            const h = currentROI.h * height;
            
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);
            
            // Draw corner markers
            const markerSize = 10;
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(x - markerSize/2, y - markerSize/2, markerSize, markerSize);
            ctx.fillRect(x + w - markerSize/2, y - markerSize/2, markerSize, markerSize);
            ctx.fillRect(x - markerSize/2, y + h - markerSize/2, markerSize, markerSize);
            ctx.fillRect(x + w - markerSize/2, y + h - markerSize/2, markerSize, markerSize);
        }
        
        // Slider handling
        const sliders = {
            x: document.getElementById('xSlider'),
            y: document.getElementById('ySlider'),
            w: document.getElementById('wSlider'),
            h: document.getElementById('hSlider'),
            contrast: document.getElementById('contrastSlider'),
            threshold: document.getElementById('thresholdSlider')
        };
        
        const values = {
            x: document.getElementById('xValue'),
            y: document.getElementById('yValue'),
            w: document.getElementById('wValue'),
            h: document.getElementById('hValue'),
            contrast: document.getElementById('contrastValue'),
            threshold: document.getElementById('thresholdValue')
        };
        
        sliders.x.addEventListener('input', (e) => {
            currentROI.x = e.target.value / 100;
            values.x.textContent = e.target.value + '%';
            displayImage();
        });
        
        sliders.y.addEventListener('input', (e) => {
            currentROI.y = e.target.value / 100;
            values.y.textContent = e.target.value + '%';
            displayImage();
        });
        
        sliders.w.addEventListener('input', (e) => {
            currentROI.w = e.target.value / 100;
            values.w.textContent = e.target.value + '%';
            displayImage();
        });
        
        sliders.h.addEventListener('input', (e) => {
            currentROI.h = e.target.value / 100;
            values.h.textContent = e.target.value + '%';
            displayImage();
        });
        
        sliders.contrast.addEventListener('input', (e) => {
            const val = e.target.value / 10;
            values.contrast.textContent = val.toFixed(1);
        });
        
        sliders.threshold.addEventListener('input', (e) => {
            values.threshold.textContent = e.target.value;
        });
        
        // Process button
        document.getElementById('processBtn').addEventListener('click', processImage);
        
        function processImage() {
            if (!originalImage) return;
            
            // Extract ROI
            const roiCanvas = document.getElementById('roiCanvas');
            const roiCtx = roiCanvas.getContext('2d');
            
            const x = currentROI.x * originalImage.width;
            const y = currentROI.y * originalImage.height;
            const w = currentROI.w * originalImage.width;
            const h = currentROI.h * originalImage.height;
            
            roiCanvas.width = w;
            roiCanvas.height = h;
            roiCtx.drawImage(originalImage, x, y, w, h, 0, 0, w, h);
            
            document.getElementById('roiSize').textContent = 
                `${Math.round(w)}×${Math.round(h)}`;
            
            // Preprocess
            preprocessImage(roiCanvas);
            
            // Simulate OCR
            simulateOCR();
        }
        
        function preprocessImage(sourceCanvas) {
            const processedCanvas = document.getElementById('processedCanvas');
            const processedCtx = processedCanvas.getContext('2d');
            
            processedCanvas.width = sourceCanvas.width;
            processedCanvas.height = sourceCanvas.height;
            
            // Get image data
            const srcCtx = sourceCanvas.getContext('2d');
            const imageData = srcCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
            const data = imageData.data;
            
            // Convert to grayscale and enhance contrast
            const contrast = parseFloat(sliders.contrast.value) / 10;
            
            for (let i = 0; i < data.length; i += 4) {
                // Grayscale
                const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                
                // Enhance contrast
                let enhanced = ((gray / 255 - 0.5) * contrast + 0.5) * 255;
                enhanced = Math.max(0, Math.min(255, enhanced));
                
                data[i] = data[i+1] = data[i+2] = enhanced;
            }
            
            processedCtx.putImageData(imageData, 0, 0);
            
            // Apply threshold for final canvas
            applyThreshold(processedCanvas);
        }
        
        function applyThreshold(sourceCanvas) {
            const finalCanvas = document.getElementById('finalCanvas');
            const finalCtx = finalCanvas.getContext('2d');
            
            finalCanvas.width = sourceCanvas.width;
            finalCanvas.height = sourceCanvas.height;
            
            const srcCtx = sourceCanvas.getContext('2d');
            const imageData = srcCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
            const data = imageData.data;
            
            const threshold = parseInt(sliders.threshold.value);
            
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i];
                const binary = gray < threshold ? 0 : 255;
                data[i] = data[i+1] = data[i+2] = binary;
            }
            
            finalCtx.putImageData(imageData, 0, 0);
        }
        
        function simulateOCR() {
            // Simulate OCR result
            const mockResults = [
                '1 1223 34455 66 7',
                '1-1223-34455-66-7',
                '1122334455667',
                '1 1223  34455  66  7'
            ];
            
            const randomResult = mockResults[Math.floor(Math.random() * mockResults.length)];
            const confidence = (Math.random() * 0.3 + 0.7).toFixed(2);
            
            document.getElementById('detectedChars').textContent = 
                randomResult.replace(/\s/g, '').length;
            document.getElementById('confidence').textContent = 
                (confidence * 100).toFixed(0) + '%';
            
            const result = document.getElementById('result');
            result.style.display = 'block';
            document.getElementById('ocrResult').textContent = 
                `Raw Text: ${randomResult}\nCleaned: ${randomResult.replace(/[^\d]/g, '')}\nFormatted: ${formatIDNumber(randomResult.replace(/[^\d]/g, ''))}\nConfidence: ${(confidence * 100).toFixed(1)}%\nValid Checksum: ${validateChecksum(randomResult.replace(/[^\d]/g, ''))}`;
        }
        
        function formatIDNumber(id) {
            if (id.length !== 13) return id;
            return `${id[0]}-${id.substring(1,5)}-${id.substring(5,10)}-${id.substring(10,12)}-${id[12]}`;
        }
        
        function validateChecksum(id) {
            if (id.length !== 13) return false;
            
            let sum = 0;
            for (let i = 0; i < 12; i++) {
                sum += parseInt(id[i]) * (13 - i);
            }
            
            const checksum = (11 - (sum % 11)) % 10;
            return checksum === parseInt(id[12]);
        }
        
        // Auto detect button
        document.getElementById('autoDetectBtn').addEventListener('click', () => {
            alert('Auto detection จะใช้ algorithm หา text regions และเลือก region ที่เหมาะสมที่สุด\n\nในการใช้งานจริงจะเชื่อมกับ backend API');
        });
        
        // Reset button
        document.getElementById('resetBtn').addEventListener('click', () => {
            sliders.x.value = 30;
            sliders.y.value = 12;
            sliders.w.value = 55;
            sliders.h.value = 8;
            sliders.contrast.value = 25;
            sliders.threshold.value = 128;
            
            currentROI = { x: 0.30, y: 0.12, w: 0.55, h: 0.08 };
            
            values.x.textContent = '30%';
            values.y.textContent = '12%';
            values.w.textContent = '55%';
            values.h.textContent = '8%';
            values.contrast.textContent = '2.5';
            values.threshold.textContent = '128';
            
            if (originalImage) displayImage();
        });
        
        // Export config
        document.getElementById('exportBtn').addEventListener('click', () => {
            const config = {
                roi: {
                    x: currentROI.x,
                    y: currentROI.y,
                    width: currentROI.w,
                    height: currentROI.h
                },
                preprocessing: {
                    contrast: parseFloat(sliders.contrast.value) / 10,
                    threshold: parseInt(sliders.threshold.value)
                }
            };
            
            const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'id_card_config.json';
            a.click();
        });
    </script>
</body>
</html>
