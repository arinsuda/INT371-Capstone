name: Build & Push FE+BE to Docker Hub

on:
  push:
    branches: [ "main" ]
    paths:
      - "changsure-core-service/**"
      - "changsure-client/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - id: be
            context: ./changsure-core-service
            dockerfile: ./changsure-core-service/Dockerfile
            image_repo: changsure-core-service
          - id: fe
            context: ./changsure-client
            dockerfile: ./changsure-client/Dockerfile
            image_repo: changsure-client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push - ${{ matrix.service.id }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image_repo }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image_repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Pull & restart BE
        run: |
          set -euo pipefail
          cd ~
          docker compose pull core-service
          docker compose up -d core-service
          docker compose ps