name: Build & Push FE+BE to Docker Hub

on:
  push:
    branches: [ "main" ]
    paths:
      - "changsure-core-service/**"
      - "changsure-client/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: core-service
            context: ./changsure-core-service
            dockerfile: ./changsure-core-service/Dockerfile
          - name: client
            context: ./changsure-client
            dockerfile: ./changsure-client/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push - ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VM & deploy BE
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          script: |
            set -e
            cd ~
            # ดึง image ล่าสุดจาก Docker Hub และสลับคอนเทนเนอร์ BE
            docker compose pull core-service
            docker compose up -d core-service
            docker image prune -f