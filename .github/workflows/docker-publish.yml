name: Build & Push FE+BE to Docker Hub

on:
  push:
    branches: ["main"]
    paths:
      - "changsure-core-service/**"
      - "changsure-client/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - {
              id: be,
              context: ./changsure-core-service,
              dockerfile: ./changsure-core-service/Dockerfile,
              image_repo: changsure-core-service,
            }
          - {
              id: fe,
              context: ./changsure-client,
              dockerfile: ./changsure-client/Dockerfile,
              image_repo: changsure-client,
            }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push - ${{ matrix.service.id }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image_repo }}:latest
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image_repo }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    env:
      IMAGE_TAG: ${{ github.sha }}
      REGISTRY: docker.io
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy with Docker Compose
        run: |
          set -euo pipefail

          # Pull images ใหม่
          docker compose pull --ignore-pull-failures

          # Restart services
          docker compose up -d --remove-orphans

          # Show running containers
          docker compose ps

          # Clean up unused images (keep last 3 days)
          docker image prune -af --filter "until=72h"
        continue-on-error: false

      - name: Verify deployment
        run: |
          echo "✅ Deployed commit: ${{ github.sha }}"
          echo "📦 Services status:"
          docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
