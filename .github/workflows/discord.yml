name: Discord Notifications

on:
  push:
  pull_request:
  issues:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        run: |
          # สร้างตัวแปรเวลาเพื่อให้แสดง Timestamp ใน Discord ได้ถูกต้อง (ISO 8601)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          curl -H "Content-Type: application/json" \
          -d "{
            \"username\": \"GitHub Actions\",
            \"avatar_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\",
            \"embeds\": [{
              \"author\": {
                \"name\": \"${{ github.actor }}\",
                \"icon_url\": \"https://github.com/${{ github.actor }}.png\",
                \"url\": \"https://github.com/${{ github.actor }}\"
              },
              \"title\": \"🔔 GitHub Event: ${{ github.event_name }}\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}\",
              \"description\": \"มีความเคลื่อนไหวใหม่ในพื้นที่ทำงานของคุณ\",
              \"color\": 3447003,
              \"fields\": [
                {
                  \"name\": \"📦 Repository\",
                  \"value\": \"[${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})\",
                  \"inline\": true
                },
                {
                  \"name\": \"🌿 Branch / Ref\",
                  \"value\": \"\`${{ github.ref_name }}\`\",
                  \"inline\": true
                }
              ],
              \"footer\": {
                \"text\": \"Automated Notification\",
                \"icon_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
              },
              \"timestamp\": \"$TIMESTAMP\"
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
