- name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "❌ Error: ไม่พบค่า DISCORD_WEBHOOK ใน GitHub Secrets"
            exit 1
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # 🎨 ระบบสี Dynamic ตามประเภท Event (UX Visual Cue)
          COLOR=3055683 # สีเขียว GitHub (ค่าเริ่มต้น/Push)
          if [ "${{ github.event_name }}" == "pull_request" ]; then COLOR=8932594; fi # สีม่วง PR
          if [ "${{ github.event_name }}" == "issues" ]; then COLOR=16743712; fi # สีส้ม Issues

          curl -H "Content-Type: application/json" \
          -d "{
            \"username\": \"GitHub Notifications\",
            \"avatar_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\",
            \"embeds\": [{
              \"color\": $COLOR,
              \"author\": {
                \"name\": \"อัปเดตโดย ${{ github.actor }}\",
                \"icon_url\": \"https://github.com/${{ github.actor }}.png\",
                \"url\": \"https://github.com/${{ github.actor }}\"
              },
              \"title\": \"📁 ${{ github.repository }}\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"description\": \"**Event:** \`${{ github.event_name }}\`  |  **Branch:** \`${{ github.ref_name }}\`\n\n> 🚀 **มีการเคลื่อนไหวใหม่ในโปรเจกต์**\n> 🔍 [**คลิกเพื่อดูรายละเอียด / Log การทำงาน**](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
              \"footer\": {
                \"text\": \"Automated Notification\",
                \"icon_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
              },
              \"timestamp\": \"$TIMESTAMP\"
            }]
          }" \
          $DISCORD_WEBHOOK
